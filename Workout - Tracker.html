<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Workout Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:Arial;margin:0;background:#0f172a;color:white}
.container{max-width:1100px;margin:auto;padding:20px}
.card{background:#1e293b;padding:20px;border-radius:12px;margin-bottom:20px}
h1{text-align:center}
select,input{padding:10px;margin:5px 0;width:100%;border-radius:6px;border:none}
button{padding:10px;background:#22c55e;border:none;color:white;font-weight:bold;border-radius:6px;cursor:pointer}
.exerciseRow{display:flex;gap:10px;margin-bottom:10px}
.exerciseRow input,.exerciseRow select{flex:1}
.stats{display:flex;gap:10px}
.stat{background:#334155;padding:15px;border-radius:8px;flex:1;text-align:center}
.fire{font-size:32px;animation:firePulse 1s infinite}
@keyframes firePulse{0%{transform:scale(1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
.historyItem{padding:8px;border-bottom:1px solid #334155}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:20px}

/* heatmap */
.heatmap{display:grid;grid-template-columns:repeat(14,20px);gap:4px}
.day{width:20px;height:20px;border-radius:3px;background:#1e293b}
.l1{background:#14532d}
.l2{background:#16a34a}
.l3{background:#22c55e}

/* progress rings */
.rings{display:flex;gap:30px;justify-content:center}
.ringBox{text-align:center}
svg{transform:rotate(-90deg)}

.aiBox{background:#0f172a;padding:15px;border-radius:8px;margin-top:10px}
.score{font-size:32px;font-weight:bold;color:#22c55e}
</style>
</head>
<body>

<div class="container">
<h1>Workout Tracker</h1>

<div class="card">
<h3>Today's Workout</h3>
<div id="exerciseContainer"></div>
<button onclick="addExerciseRow()">Add Exercise</button>
<button onclick="saveWorkout()">Submit Today Workout</button>
</div>

<div class="card stats">
<div class="stat"><div id="streak">0</div>🔥 Streak</div>
<div class="stat"><div id="xp">0</div>XP</div>
<div class="stat"><div id="level">1</div>Level</div>
<div class="stat"><div id="freeze">1</div>Streak Freezes</div>
</div>

<div class="card">
<h3>Weekly Performance</h3>
<div class="score" id="weeklyScore">0</div>
<div class="aiBox" id="aiFeedback"></div>
</div>

<div class="card">
<h3>Progress Rings</h3>
<div class="rings">
<div class="ringBox">
<svg width="120" height="120">
<circle cx="60" cy="60" r="50" stroke="#334155" stroke-width="10" fill="none"/>
<circle id="ring1" cx="60" cy="60" r="50" stroke="#22c55e" stroke-width="10" fill="none" stroke-dasharray="314" stroke-dashoffset="314"/>
</svg>
<div>Workout Goal</div>
</div>
<div class="ringBox">
<svg width="120" height="120">
<circle cx="60" cy="60" r="50" stroke="#334155" stroke-width="10" fill="none"/>
<circle id="ring2" cx="60" cy="60" r="50" stroke="#38bdf8" stroke-width="10" fill="none" stroke-dasharray="314" stroke-dashoffset="314"/>
</svg>
<div>Calories Goal</div>
</div>
</div>
</div>

<div class="card">
<h3>Workout Heatmap</h3>
<div id="heatmap" class="heatmap"></div>
</div>

<div class="card">
<h3>Analytics</h3>
<div class="charts">
<canvas id="volumeChart"></canvas>
<canvas id="durationChart"></canvas>
<canvas id="calorieChart"></canvas>
</div>
</div>

<div class="card">
<h3>History</h3>
<div id="history"></div>
</div>

</div>

<script>

const exercises=["Push Ups","Pull Ups","Running","Squats","Cycling","Plank","Bench Press","Deadlift"];

let data=JSON.parse(localStorage.getItem("workoutData"))||[];
let xp=Number(localStorage.getItem("xp"))||0;
let freezes=Number(localStorage.getItem("freeze"))||1;

function today(){return new Date().toISOString().split('T')[0];}

function addExerciseRow(){
let container=document.getElementById("exerciseContainer");
let div=document.createElement("div");
div.className="exerciseRow";

let select=document.createElement("select");
exercises.forEach(e=>{let o=document.createElement("option");o.text=e;select.add(o);});

let reps=document.createElement("input");reps.placeholder="Reps";
let time=document.createElement("input");time.type="time";
let duration=document.createElement("input");duration.placeholder="Minutes";

[select,reps,time,duration].forEach(x=>div.appendChild(x));
container.appendChild(div);
}

function estimateCalories(name,duration){
const rates={Running:10,Cycling:8,"Push Ups":7,"Pull Ups":8,Squats:7,Plank:5,"Bench Press":6,Deadlift:6};
return (rates[name]||6)*duration;
}

function saveWorkout(){
if(data.find(d=>d.date===today())){alert("Workout already saved today");return;}

let rows=document.querySelectorAll(".exerciseRow");
let exercisesDone=[];

rows.forEach(r=>{
let f=r.children;
let duration=Number(f[3].value);

exercisesDone.push({
name:f[0].value,
reps:f[1].value,
time:f[2].value,
duration:duration,
calories:estimateCalories(f[0].value,duration)
});
});

let entry={date:today(),exercises:exercisesDone};
data.push(entry);

xp+=exercisesDone.length*10;

localStorage.setItem("xp",xp);
localStorage.setItem("workoutData",JSON.stringify(data));

location.reload();
}

function calculateStreak(){
let streak=0;let current=new Date();
while(true){
let date=current.toISOString().split('T')[0];
if(data.find(d=>d.date===date)){streak++;current.setDate(current.getDate()-1);} 
else{if(streak>0&&freezes>0){freezes--;localStorage.setItem("freeze",freezes);streak++;}break;}
}
return streak;
}

function levelFromXP(){return Math.floor(xp/100)+1;}

function loadStats(){
let streak=calculateStreak();

document.getElementById("streak").innerText=streak;
document.getElementById("xp").innerText=xp;
document.getElementById("level").innerText=levelFromXP();
document.getElementById("freeze").innerText=freezes;
}

function loadHistory(){
let history=document.getElementById("history");
let html="";

[...data].reverse().forEach(day=>{
html+=`<div class='historyItem'><b>${day.date}</b>`;

day.exercises.forEach(e=>{
html+=`<div>${e.name} ${e.reps} ${e.duration}min 🔥${e.calories}</div>`;
});

html+="</div>";
});

history.innerHTML=html;
}

function heatmap(){
let map=document.getElementById("heatmap");map.innerHTML="";

for(let i=180;i>=0;i--){
let d=new Date();d.setDate(d.getDate()-i);
let date=d.toISOString().split('T')[0];
let day=data.find(x=>x.date===date);

let div=document.createElement("div");div.className="day";

if(day){
let vol=day.exercises.length;
if(vol==1)div.classList.add("l1");
if(vol==2)div.classList.add("l2");
if(vol>=3)div.classList.add("l3");
}

map.appendChild(div);
}
}

function rings(){
let todayData=data.find(d=>d.date===today());
let workouts=todayData?todayData.exercises.length:0;
let calories=todayData?todayData.exercises.reduce((s,e)=>s+e.calories,0):0;

let workoutGoal=5;let calorieGoal=300;

let wPercent=Math.min(workouts/workoutGoal,1);
let cPercent=Math.min(calories/calorieGoal,1);

let circumference=314;

document.getElementById("ring1").style.strokeDashoffset=circumference*(1-wPercent);
document.getElementById("ring2").style.strokeDashoffset=circumference*(1-cPercent);
}

function weeklyPerformance(){

let days=7;
let workouts=0;
let minutes=0;

for(let i=0;i<days;i++){
let d=new Date();d.setDate(d.getDate()-i);
let date=d.toISOString().split('T')[0];
let day=data.find(x=>x.date===date);

if(day){
workouts+=day.exercises.length;
minutes+=day.exercises.reduce((s,e)=>s+e.duration,0);
}
}

let score=Math.min(Math.round((workouts*5 + minutes*0.5)),100);

document.getElementById("weeklyScore").innerText=score+" / 100";

let feedback="";

if(score>=80) feedback="Excellent consistency this week. Your training volume is strong. Maintain recovery and keep pushing.";
else if(score>=60) feedback="Good work. Try adding one more workout session or increasing duration slightly.";
else if(score>=40) feedback="Moderate activity detected. Increasing frequency will improve endurance and streak stability.";
else feedback="Low activity this week. Aim for short daily workouts to rebuild momentum.";


document.getElementById("aiFeedback").innerText=feedback;
}

function groupLast7Days(){
let labels=[],volume=[],duration=[],calories=[];

for(let i=6;i>=0;i--){
let d=new Date();d.setDate(d.getDate()-i);
let date=d.toISOString().split('T')[0];
labels.push(date);

let day=data.find(x=>x.date===date);

if(day){
volume.push(day.exercises.length);
duration.push(day.exercises.reduce((s,e)=>s+e.duration,0));
calories.push(day.exercises.reduce((s,e)=>s+e.calories,0));
}else{volume.push(0);duration.push(0);calories.push(0);} 
}

return {labels,volume,duration,calories};
}

function charts(){
let s=groupLast7Days();

new Chart(volumeChart,{type:"bar",data:{labels:s.labels,datasets:[{label:"Exercises",data:s.volume}]}});
new Chart(durationChart,{type:"line",data:{labels:s.labels,datasets:[{label:"Minutes",data:s.duration}]}});
new Chart(calorieChart,{type:"line",data:{labels:s.labels,datasets:[{label:"Calories",data:s.calories}]}});
}

if(!data.find(d=>d.date===today())) addExerciseRow();

loadStats();
loadHistory();
heatmap();
rings();
weeklyPerformance();
charts();

</script>
</body>
</html>
